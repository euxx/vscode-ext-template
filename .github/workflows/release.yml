name: Release

on:
  workflow_dispatch:
    inputs:
      overwrite:
        description: Overwrite existing release if tag already exists
        type: boolean
        default: false

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read package info
        id: pkg
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run checks
        run: npm run ci

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies -o ${{ steps.pkg.outputs.name }}-${{ steps.pkg.outputs.version }}.vsix

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if [[ "${{ inputs.overwrite }}" == "true" ]]; then
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "${{ steps.pkg.outputs.name }}-${{ steps.pkg.outputs.version }}.vsix"
